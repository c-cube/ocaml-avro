name: build
on:
  push:
  pull_request:
    branches:
      - master
jobs:
  run:
    name: build
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        container:
          - ghcr.io/c-cube/c-cube-commmon/ci-4.14:latest
          - ghcr.io/c-cube/c-cube-commmon/ci-5.0:latest
          - ghcr.io/c-cube/c-cube-commmon/ci-5.4:latest
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v6
      - run: opam pin -n .
      - run: opam install -t . --deps-only
      - run: opam exec -- dune build --ignore-promoted-rules
      - run: opam exec -- dune runtest --ignore-promoted-rules
